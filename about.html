        <!-- 
          HAWI: Replace the placeholder text below with your dad's actual bio.

        <p>
          ጸጋኒ ፉሩስ ናይ ሓሳባት ቦታ እዩ — ኤርትራዊ ፖለቲካን ፍልስፍናን ብዕምቆት ዝዝቲ።
        </p>
        <p>
          ናይዚ ብሎግ ጸሓፊ ምሁር ኤርትራዊ እዩ። ዓሰርተታት ዓመታት ዝኾኑ ናይ ጽሕፈት ተሞክሮ ዘለዎ፡ ናይ ሃገሩ ኩነታት ብቐሊሉ ዘይሓልፎ ሰብ እዩ።
        </p>
        <p>
          ኣብዚ ዝርከቡ ጽሑፋት ናይ ሓደ ሰብ ሓሳባትን ትዕዝብትን ጥራሕ እዮም — ካብ ፍቕሪ ሃገርን ህዝብን ዝብገሱ።
        </p>
